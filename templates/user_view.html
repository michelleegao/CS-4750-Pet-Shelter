<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details</title>
    <link rel="stylesheet" href="/static/css/pets_view.css">
</head>
<body>
    <div class="page">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="nav-left">
                <a href="/">Pet Shelter App</a>
                <a href="/templates/pets_search.html">Pets</a>
                <a href="/templates/user_search.html">Users</a>
                <a href="/families">Families</a>
                <a href="/events">Events</a>
                <a href="#">Appointments</a>
            </div>

            <svg class="profile-icon" viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4"></circle>
                <path d="M4 20c1.5-3.5 5-5 8-5s6.5 1.5 8 5"></path>
            </svg>
        </nav>

        <!-- Main content area -->
        <main class="details-section">
            <div class="top-row">
                <a href="/pets" class="return-btn">Return to Search</a>
                <h1 class="page-title">All About [User Name]</h1>
            </div>

            <div class="details-content">
                <!-- Left side -->
                <div class="pet-left">
                    <div class="pet-image-frame">
                        <img
                            src="https://d3544la1u8djza.cloudfront.net/APHI/Blog/2023/September/small-breeds-hero.jpg"
                            alt="Pet photo"
                        >
                    </div>

                    <div class="action-buttons">
                        <button class="action-btn">Delete user</button>
                        <button class="action-btn" id="openEditModal">Edit user information</button>
                    </div>
                </div>

                <!-- Right side -->
                <div class="pet-right">
                    <div class="info-scroll">

                        <div class="info-row">
                            <div class="info-label">User ID:</div>
                            <div class="info-value">[user ID here]</div>
                        </div>

                        <div class="info-row">
                            <div class="info-label">First Name:</div>
                            <div class="info-value">[first name info here]</div>
                        </div>

                        <div class="info-row">
                            <div class="info-label">Last Name:</div>
                            <div class="info-value">[last name info here]</div>
                        </div>

                        <div class="info-row">
                            <div class="info-label">Email:</div>
                            <div class="info-value">[Email here]</div>
                        </div>

                        <div class="info-row">
                            <div class="info-label">Phone Number:</div>
                            <div class="info-value">[phone number here]</div>
                        </div>

                        <div class="info-row">
                            <div class="info-label">Role:</div>
                            <div class="info-value">[role info here]</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Edit Popup -->
        <div class="modal-overlay" id="editModal">
            <div class="edit-modal">
                <button class="close-modal" id="closeEditModal">&times;</button>

                <div class="edit-title">Edit User Information</div>

                <div class="edit-modal-content">
                    <div class="edit-left-panel">
                        <div class="edit-photo-box">
                            <img
                                src="https://d3544la1u8djza.cloudfront.net/APHI/Blog/2023/September/small-breeds-hero.jpg"
                                alt="Pet photo"
                            >
                        </div>

                        <button class="upload-btn">upload new photo</button>
                    </div>

                    <div class="edit-form-panel">
                        <div class="edit-scroll">
                            <div class="edit-row">
                                <label class="edit-label">User ID:</label>
                                <input class="edit-input" type="text" placeholder="[EDIT HERE]">
                            </div>

                            <div class="edit-row">
                                <label class="edit-label">First Name:</label>
                                <input class="edit-input" type="text" placeholder="[EDIT HERE]">
                            </div>

                            <div class="edit-row">
                                <label class="edit-label">Last Name:</label>
                                <input class="edit-input" type="text" placeholder="[EDIT HERE]">
                            </div>

                            <div class="edit-row">
                                <label class="edit-label">Email:</label>
                                <input class="edit-input" type="text" placeholder="[EDIT HERE]">
                            </div>

                            <div class="edit-row">
                                <label class="edit-label">Phone Number:</label>
                                <input class="edit-input" type="text" placeholder="[EDIT HERE]">
                            </div>

                            <div class="edit-row">
                                <label class="edit-label">Role:</label>
                                <input class="edit-input" type="text" placeholder="[EDIT HERE]">
                            </div>
                        </div>
                    </div>

                    <div class="edit-buttons-panel">
                        <button class="modal-action-btn confirm-btn">confirm edits</button>
                        <button class="modal-action-btn cancel-btn" id="cancelEditModal">cancel edits</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Handles edit page -->
    <script>
        const editModal = document.getElementById("editModal");
        const openEditModal = document.getElementById("openEditModal");
        const closeEditModal = document.getElementById("closeEditModal");
        const cancelEditModal = document.getElementById("cancelEditModal");

        openEditModal.addEventListener("click", () => {
            editModal.classList.add("show");
        });

        closeEditModal.addEventListener("click", () => {
            editModal.classList.remove("show");
        });

        cancelEditModal.addEventListener("click", () => {
            editModal.classList.remove("show");
        });

        editModal.addEventListener("click", (e) => {
            if (e.target === editModal) {
                editModal.classList.remove("show");
            }
        });
    </script>
</body>
</html>
