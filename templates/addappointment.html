<!DOCTYPE html>
<html>
<head>
    <title>Add Appointment</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/add.css">
</head>

<body>

<header>
    <nav class="navbar">
        <div class="nav-left">
            <a href="/">Pet Shelter App</a>
            <a href="/pets_search">Pets</a>
            <a href="/user_search">Users</a>
            <a href="/families">Foster Families</a>
            <a href="#">Events</a>
            <a href="/appointments">Appointments</a>
        </div>

        <svg class="profile-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 20c1.5-3.5 5-5 8-5s6.5 1.5 8 5"></path>
        </svg>
    </nav>
</header>

<div class="page">
    <div class="outer-box">

        <form id="add-form">

            <div class="left">
                <div class="buttons-group">
                    <button type="button" id="cancel">Cancel Changes</button>
                </div>
            </div>

            <div class="center">

                <div class="add-header">
                    <h1>Create New Appointment</h1>
                </div>

                <div class="inner-box">

                    <!-- PET ID INPUT -->
                    <div class="input-group">
                        <label><strong>Pet ID</strong></label>
                        <input 
                            type="text" 
                            id="pet-popup-value" 
                            name="pet_id"
                            placeholder="Enter Pet ID"
                        >
                    </div>

                    <!-- EMPLOYEE ID INPUT -->
                    <div class="input-group">
                        <label><strong>Employee ID</strong></label>
                        <input 
                            type="text" 
                            id="employee-popup-value" 
                            name="employee_id"
                            placeholder="Enter Employee ID"
                        >
                    </div>

                    <!-- DATE/TIME -->
                    <div class="input-group">
                        <label><strong>Date and Time of Appointment</strong></label>
                        <input type="datetime-local" id="datetime" name="datetime">
                    </div>

                    <!-- REASON -->
                    <div class="input-group">
                        <label><strong>Reason for Appointment</strong></label>
                        <input id="appointmentReason" name="reason" type="text" placeholder="Reason for Appointment">
                    </div>

                    <!-- COST -->
                    <div class="input-group">
                        <label><strong>Cost of Appointment</strong></label>
                        <input id="cost" name="cost" type="text" placeholder="Cost of Appointment">
                    </div>

                    <!-- NOTES -->
                    <div class="input-group">
                        <label><strong>Appointment Notes</strong></label>
                        <input id="notes" name="notes" type="text" placeholder="Appointment Notes">
                    </div>

                </div>
            </div>

            <div class="right">
                <input type="submit" value="Create Appointment">
            </div>

        </form>

    </div>
</div>

<script src="/static/js/add.js"></script>

</body>

</html>
