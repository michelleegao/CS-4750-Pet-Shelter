<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Families Search</title>
    <link rel="stylesheet" href="/static/css/pets_search.css">
</head>
<body>
    <div class="page">
        <!-- Navigation Bar -->
        <div class="top-section">
            <nav class="navbar">
                <div class="nav-left">
                    <a href="/">Pet Shelter App</a>
                    <a href="pets">Pets</a>
                    <a href="#">Users</a>
                    <a href="families">Families</a>
                    <a href="#">Events</a>
                    <a href="#">Appointments</a>
                </div>
                <svg class="profile-icon" viewBox="0 0 24 24">
                    <circle cx="12" cy="8" r="4"></circle>
                    <path d="M4 20c1.5-3.5 5-5 8-5s6.5 1.5 8 5"></path>
                </svg>
            </nav>

            <!-- Search bar, add button, filter button -->
            <div class="search-bar">
                <button onclick="location.href='/family_add'" class="add-btn">Add a family</button>

                <form class="search-form" action="/pets/search" method="GET">
                    <input
                    type="text"
                    name="query"
                    placeholder="Search..."
                    class="search-input"
                    value="{{ query if query else '' }}"
                    />
                </form>

                <button class="filter-btn">Filter</button>
            </div>
        </div>

        <!-- Family view -->
        <div class="pets-container">
            <div class="pets-grid">
                {% if families %}
                    {% for family in families %}
                        <a href="{{ url_for('families_view', family_id=family.family_id) }}" class="family-card-link">
                            <div class="pet-item">
                                <img
                                    src="{{ family.photo_url if family.photo_url else 'https://cdn.creativefabrica.com/2021/02/08/Family-Member-Family-Vector-Illustration-Graphics-8412052-2-580x387.jpg' }}"
                                    alt="Family"
                                >
                                <p class="pet-name">{{ family.first_name }} {{ family.last_name }}</p>
                                <!-- <p class="pet-id">{{ family.family_id }}</p> -->
                            </div>
                        </a>
                    {% endfor %}
                {% else %}
                    <p>No families found.</p>
                {% endif %}
