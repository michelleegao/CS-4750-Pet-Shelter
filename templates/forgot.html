<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login-create-forgot.css') }}">
</head>
<body>

<div class="top-section">
  <div class="app-name">Pet Shelter</div>

  <div class="login-container">
    <h1>Reset Password</h1>

    <div class="form-group">
      <label>Email:</label>
      <input type="text" id="forgotUsername" required>
    </div>

    <button id="checkUserBtn" class="enter-btn">Check User</button>

    <p id="messageBox"></p>

    <!-- hidden until user exists -->
    <div id="resetSection" style="display:none;">
      <div class="form-group">
        <label>New Password:</label>
        <input type="password" id="newPassword">
      </div>

      <button id="resetBtn" class="enter-btn">Reset Password</button>
    </div>

    <div class="links">
      <a href="/">Back to login</a>
    </div>
  </div>
</div>

<div class="bottom-section"></div>
<style>
  .bottom-section {
    height: 20vh;
    background-image: url("{{ url_for('static', filename='images/paw_print.jpg') }}");
    background-size: 294px;
    background-repeat: repeat;
  }
</style>

<script src="{{ url_for('static', filename='js/login-create-forgot.js') }}"></script>
</body>
</html>
