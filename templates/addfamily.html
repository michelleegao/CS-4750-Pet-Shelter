<!DOCTYPE html>
<html>
<head>
    <title>Add a New Family</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/add.css">
</head>
<header>
    <nav class="navbar">
        <div class="nav-left">
            <a href="/">Pet Shelter App</a>
            <a href="/templates/pets_search.html">Pets</a>
            <a href="/templates/user_search.html">Users</a>
            <a href="/templates/families_search.html">Foster Families</a>
            <a href="#">Events</a>
            <a href="#">Appointments</a>
        </div>

        <svg class="profile-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 20c1.5-3.5 5-5 8-5s6.5 1.5 8 5"></path>
        </svg>
    </nav>
</header>
<body>
    <h1>Create New Family</h1>

    <div class="page">
        <div class="outer-box">
            <div class="inner-box">
                <form id="add-form">
                    <div class="input-group">
                        <label for="species"><strong>Preferred Species</strong></label>
                        <input id="species" type="text" placeholder="Preferred Species">
                    </div>
                    <div class="input-group">
                        <label for="occupant_number"><strong>Number of Occupants in the Home</strong></label>
                        <input id="occupant_number" type="number" min="0" step="1" placeholder="Number of Occupants">
                    </div>
                    <div class="input-group">
                        <label for="pet_number"><strong>Number of Pets Already Owned</strong></label>
                        <input id="pet_number" type="number" min="0" step="1" placeholder="Number of Pets">
                    </div>
                    <div class="input-group">
                        <label for="street"><strong>Home Address: Street Number and Name</strong></label>
                        <input id="street" type="text" placeholder="Street">
                    </div>
                    <div class="input-group">
                        <label for="city"><strong>Home Address: City</strong></label>
                        <input id="city" type="text" placeholder="City">
                    </div>
                    <div class="input-group">
                        <label for="state"><strong>Home Address: State</strong></label>
                        <input id="state" type="text" placeholder="State">
                    </div>
                    <div class="input-group">
                        <label for="zipCode"><strong>Home Address: Zip Code</strong></label>
                        <input id="zipCode" type="text" placeholder="Zip Code">
                    </div>
                    <div class="input-group">
                        <label for="country"><strong>Home Address: Country</strong></label>
                        <input id="country" type="text" placeholder="Country">
                    </div>
                    <div class="input-group">
                        <label><strong>Children?</strong></label>
    
                        <label>
                            <input type="radio" name="children" value="yes">
                            Yes
                        </label>
                        <label>
                            <input type="radio" name="children" value="no">
                            No
                        </label>
                    </div>
                    <div class="input-group">
                        <label for="phone"><strong>Phone Number</strong></label>
                        <input id="phone" type="tel" placeholder="Phone Number">
                    </div>
                    <div class="input-group">
                        <label for="email"><strong>Email Address</strong></label>
                        <input id="email" type="email" placeholder="Email Address">
                    </div>
                    <div class="input-group">
                        <label><strong>Type of Family</strong></label>

                        <label>
                            <input type="radio" name="family" value="Foster Family">
                            Foster
                        </label>
                        <label>
                            <input type="radio" name="family" value="Adoptive">
                            Adoptive
                        </label>
                    </div>
                    <div class="input-group">
                        <label for="family-photo"><strong>Please Upload a Photo of the Family</strong></label>
                        <input id="family_photo" type="image" placeholder="Family Photo Here">
                    </div>
                    <div class="button-group">
                        <input type="submit" name="submit" value="Save Changes">
                        <button id="cancel">Cancel Changes</button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    
</body>
<footer>
    <p>CS4750 Final Project</p>
</footer>
</html>
