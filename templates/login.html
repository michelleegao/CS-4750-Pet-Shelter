<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login-create-forgot.css') }}">
</head>
<body>

<div class="top-section">
  <div class="app-name">Pet Shelter</div>

  <div class="login-container">
    <h1>Employee Login</h1>

    <form id="loginForm" method="POST" action="/login">
      <div class="form-group">
        <label>Email:</label>
        <input type="text" id="email" required>
      </div>

      <div class="form-group">
        <label>Password:</label>
        <input type="password" id="password" required>
      </div>

      <button type="submit" class="enter-btn">Enter</button>

      <div class="links">
        <a href="/signup">Sign up</a>
        <a href="/forgot">Forgot password/email?</a>
      </div>
    </form>
  </div>
</div>

<div class="bottom-section"></div>
<style>
  .bottom-section {
    height: 20vh;
    background-image: url("{{ url_for('static', filename='images/paw_print.jpg') }}");
    background-size: 294px;
    background-repeat: repeat;
  }
</style>

<script src="{{ url_for('static', filename='js/login-create-forgot.js') }}"></script>
</body>
</html>
