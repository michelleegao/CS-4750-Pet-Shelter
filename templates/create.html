<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Sign Up</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login-create-forgot.css') }}">
</head>
<body>

<div class="top-section">
  <div class="app-name">Pet Shelter</div>

  <div class="login-container">
    <h1>Employee Sign Up</h1>

    <form id="createForm" method="POST" action="/signup">
      <div class="form-group">
        <label>First Name:</label>
        <input type="text" id="firstName" required>
      </div>

      <div class="form-group">
        <label>Last Name:</label>
        <input type="text" id="lastName" required>
      </div>

      <div class="form-group">
        <label>Email:</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-group">
        <label>Phone Number:</label>
        <input type="text" id="phoneNumber" required>
      </div>

      <div class="form-group">
        <label>Password:</label>
        <input type="password" id="password" required>
      </div>

      <div class="form-group">
        <label>Confirm Password:</label>
        <input type="password" id="confirmPassword" required>
      </div>

      <div class="form-group">
        <label>Position Name:</label>
        <select id="positionName" required>
          <option value="" disabled selected>Select position</option>
          <option value="full-time employee">Full-Time Employee</option>
          <option value="part-time employee">Part-Time Employee</option>
          <option value="intern">Intern</option>
        </select>
      </div>

      <button type="submit" class="enter-btn">Enter</button>

      <div class="links">
        <a href="/">Back to login</a>
      </div>
    </form>
  </div>
</div>

<div class="bottom-section"></div>
<style>
  .bottom-section {
    height: 20vh;
    background-image: url("{{ url_for('static', filename='images/paw_print.jpg') }}");
    background-size: 294px;
    background-repeat: repeat;
  }
</style>

<script src="{{ url_for('static', filename='js/login-create-forgot.js') }}"></script>
</body>
</html>
